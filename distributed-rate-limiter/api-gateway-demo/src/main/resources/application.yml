server:
  port: 8080

spring:
  application:
    name: api-gateway-demo
  datasource:
    url: jdbc:h2:mem:gateway;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

rate-limiter:
  enabled: true
  default-algorithm: SLIDING_WINDOW_COUNTER
  default-max-requests: 100
  default-window-ms: 60000
  rules:
    demo-tier:
      algorithm: TOKEN_BUCKET
      max-requests: 50
      window-ms: 60000

logging:
  level:
    com.lokesh: INFO
